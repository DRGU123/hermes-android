name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME/ 2>&1 | head -10
          echo "=== cmdline-tools ==="
          ls -la $ANDROID_HOME/cmdline-tools/ 2>&1 || echo "not found"
          echo "=== platforms ==="
          ls -la $ANDROID_HOME/platforms/ 2>&1 || echo "not found"
          echo "=== build-tools ==="
          ls -la $ANDROID_HOME/build-tools/ 2>&1 || echo "not found"

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 | tail -5

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.4

      - name: Build debug APK
        run: |
          cd app
          gradle assembleDebug --no-daemon --stacktrace 2>&1
          echo "=== APK FILE CHECK ==="
          APK_PATH="build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "APK exists! Size: $(wc -c < $APK_PATH) bytes"
            unzip -l "$APK_PATH" 2>&1 | head -20
          else
            echo "ERROR: APK not found at $APK_PATH"
            find . -name "*.apk" -type f 2>&1
          fi
          echo "=== Build outputs ==="
          find build/outputs -type f 2>&1

      - name: Upload full build dir
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-full
          path: app/build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneBridge-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Print APK info
        run: |
          APK=$(find . -name "*.apk" -type f | head -1)
          echo "APK: $APK"
          ls -lh "$APK"
